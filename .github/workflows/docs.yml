name: Docs

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions: {}

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          version-file: uv.lock

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: false

      - name: Build docs for all releases and main
        run: |
          (echo dev && git tag -l "v*") | while read -r tag; do
            echo "::group::Processing release: $tag"
            [[ "$tag" == "dev" ]] && git checkout main || git checkout $tag
            uv run zensical build --strict
            mkdir -p "docs-build/$tag"
            mv site/* "docs-build/$tag"
            echo "::endgroup::"
          done

          # Create versions.json at root
          (cd docs-build; printf '%s\n' * | jq -R . | jq -s 'map({version: ., title: ., aliases: []})' > versions.json)

          # Create redirect to dev docs at root
          cat <<EOF > docs-build/index.html
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=dev/"></head>
          <body><a href="dev/">Redirecting...</a></body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./docs-build

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
