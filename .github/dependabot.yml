version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      trivial:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: lockfile-only
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    groups:
      trivial:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

