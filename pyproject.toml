[project]
name = "keylet"
version = "0.1.0"
description = "Client application Tillitis TKey ML-DSA signer"
readme = "README.md"
authors = [
    { name = "Jussi Kukkonen", email = "jkukkonen@google.com" }
]
requires-python = ">=3.10"
dependencies = [
    "cryptography>=48.0.0",
    "pyserial>=3.5",
]

[project.scripts]
keylet = "keylet.bin.cli:main"


[dependency-groups]
dev = [
    "mypy>=1.10.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.3.0",
    "types-pyserial>=3.5.0.20240310",
    "zizmor>=0.8.0",
]

[build-system]
requires = ["uv_build>=0.11.21,<0.12.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "RUF",  # Ruff-specific rules
]
ignore = []

[tool.mypy]
python_version = "3.10"
strict = true
warn_unreachable = true

[[tool.mypy.overrides]]
module = "serial.*"
ignore_missing_imports = true
